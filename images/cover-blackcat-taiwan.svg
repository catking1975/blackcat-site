      </feComponentTransfer>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <radialGradient id="halo" cx="0.5" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#cfdcef" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0a1120" stop-opacity="0" />
    </radialGradient>
  </defs>
